# Reproducible deployment for the LUIS assistant.
#
# 1. Copy .env.example to .env and fill in your values (see DEPLOYMENT.md).
# 2. docker compose build
# 3. docker compose up -d
#
# Every value here comes from the environment / .env file — there are NO
# hardcoded IPs, tokens or paths, so this file is safe to commit and anyone
# can reproduce the setup with their own .env.
services:
  luis:
    container_name: ${CONTAINER_NAME:-luis}
    build:
      context: .
      dockerfile: Dockerfile
    image: luis:local
    restart: unless-stopped
    ports:
      - "${WEB_PUBLISHED_PORT:-3030}:3000"
    # Inject the whole .env into the container. New variables only need to be
    # added to .env — no need to also list them under `environment:` below.
    # (Entries in `environment:` still win over env_file when both set a key.)
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      ASSISTANT_NAME: ${ASSISTANT_NAME:-luis}

      # --- Local LLM (OpenAI-compatible endpoint) ---
      LLM_PROVIDER: ${LLM_PROVIDER:-local}
      LOCAL_LLM_BASE_URL: ${LOCAL_LLM_BASE_URL}
      LOCAL_LLM_MODEL: ${LOCAL_LLM_MODEL}
      LOCAL_LLM_API_KEY: ${LOCAL_LLM_API_KEY:-}
      LOCAL_LLM_TIMEOUT_MS: ${LOCAL_LLM_TIMEOUT_MS:-600000}
      ALLOW_CLOUD_LLM: ${ALLOW_CLOUD_LLM:-false}

      # --- Web UI (LAN only) ---
      WEB_ENABLED: ${WEB_ENABLED:-true}
      WEB_HOST: 0.0.0.0
      WEB_PORT: "3000"

      # --- Watchtower webhook (optional; relays to Telegram like /cluster) ---
      WATCHTOWER_WEBHOOK_TOKEN: ${WATCHTOWER_WEBHOOK_TOKEN:-}

      # --- Web tools ---
      WEB_SEARCH_BASE_URL: ${WEB_SEARCH_BASE_URL:-}
      URL_FETCH_ALLOW_PRIVATE: ${URL_FETCH_ALLOW_PRIVATE:-false}
      URL_FETCH_ALLOWLIST: ${URL_FETCH_ALLOWLIST:-}

      # --- Downloads watcher ---
      DOWNLOADS_PATH: /data/downloads
      DOWNLOAD_RULES_PATH: /data/config/download-rules.json

      # --- Telegram ---
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_ALLOWED_CHAT_IDS: ${TELEGRAM_ALLOWED_CHAT_IDS}
      TELEGRAM_NOTIFY_CHAT_ID: ${TELEGRAM_NOTIFY_CHAT_ID:-}

      # --- Home Assistant (optional) ---
      HA_BASE_URL: ${HA_BASE_URL:-}
      HA_TOKEN: ${HA_TOKEN:-}
      HA_LANGUAGE: ${HA_LANGUAGE:-es}
      HA_AGENT_ID: ${HA_AGENT_ID:-}

      # --- Cluster watcher (optional; required IPs when enabled) ---
      CLUSTER_ENABLED: ${CLUSTER_ENABLED:-false}
      CLUSTER_N2_IP: ${CLUSTER_N2_IP:-}
      CLUSTER_N3_IP: ${CLUSTER_N3_IP:-}
      CLUSTER_N4_IP: ${CLUSTER_N4_IP:-}
      # LUI-BUG-0010: el estado del watcher (state.json, derivado de este path)
      # DEBE vivir en el volumen persistente /data/config; si no, cada deploy
      # reinicia el contenedor con estado vacío y re-notifica los nodos ya caídos.
      CLUSTER_HISTORY_PATH: ${CLUSTER_HISTORY_PATH:-/data/config/cluster-history.json}
      # LUI-TSK-0080: nodos silenciados (apagados a propósito), p.ej. "n4".
      CLUSTER_MUTED_NODES: ${CLUSTER_MUTED_NODES:-}
      # Franja silenciosa nocturna del watcher (HH:MM). Vacío = sin filtro.
      CLUSTER_QUIET_START: ${CLUSTER_QUIET_START:-}
      CLUSTER_QUIET_END: ${CLUSTER_QUIET_END:-}

      # --- Prometheus down-check (optional; on-demand "is anything down?") ---
      # Opt-in: set PROMETHEUS_ENABLED=true and PROMETHEUS_BASE_URL to your
      # Prometheus HTTP endpoint (e.g. http://<host>:9090).
      PROMETHEUS_ENABLED: ${PROMETHEUS_ENABLED:-false}
      PROMETHEUS_BASE_URL: ${PROMETHEUS_BASE_URL:-}
      PROMETHEUS_TIMEOUT_MS: ${PROMETHEUS_TIMEOUT_MS:-8000}
    volumes:
      - ./data/downloads:/data/downloads:rw
      - ./data/config:/data/config:rw
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
